name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install development dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest

      - name: Build package
        run: uv build
